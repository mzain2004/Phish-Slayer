<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#2463eb",
              "background-light": "#fafafa",
              "background-dark": "#111621",
            },
            fontFamily: {
              "display": ["Inter", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},

    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased">
<div class="min-h-screen flex flex-col items-center justify-center p-6">
<!-- Logo Section -->
<div class="mb-8 flex items-center gap-3">
<div class="flex items-center justify-center w-10 h-10 bg-primary rounded-lg shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-white text-2xl">shield_locked</span>
</div>
<h1 class="text-2xl font-bold tracking-tight text-slate-900 dark:text-slate-100">Phish-Slayer</h1>
</div>
<!-- Main Card -->
<div class="w-full max-w-[480px] bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 shadow-xl shadow-slate-200/50 dark:shadow-none p-8 md:p-10">
<div class="text-center mb-8">
<h2 class="text-3xl font-bold text-slate-900 dark:text-slate-100 mb-2">Create your account</h2>
<p class="text-slate-500 dark:text-slate-400">Start protecting your enterprise today</p>
</div>
<!-- Social Auth Buttons -->
<div class="flex flex-col gap-3 mb-8">
<button class="flex items-center justify-center gap-3 w-full h-12 px-4 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-700 dark:text-slate-200 font-semibold hover:bg-slate-50 dark:hover:bg-slate-750 transition-colors">
<img alt="Google Logo" class="w-5 h-5" data-alt="Google colorful letter G logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAWQC8So2xWw0Pcde9cPl1AX2Lwkl3iqVatxoA92KLM0wAUg7NDKPEC_7Moj3eKEA26O65OdjPgBasIxlJDOXbrqKTnF2-xZ_uKbYVoOEi3n7XtbHczosvGon88GONtOk3wKoyud1xY5mAmYvdsp2SjlERLOG3kcHBSsxjuYSC19ym-SYPOEfbn2SZFDDJwQ8Sk0j_SAzcnIKe_R_jhmuO2Nvs0mQairGk9kakqJgnIz_jHYk5ij5tV52urY-aVzO87UW9BHsEnSCQn"/>
<span>Sign up with Google</span>

<button class="flex items-center justify-center gap-3 w-full h-12 px-4 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-700 dark:text-slate-200 font-semibold hover:bg-slate-50 dark:hover:bg-slate-750 transition-colors">
<svg class="w-5 h-5 fill-current" viewbox="0 0 24 24"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"></path></svg>
<span>Sign up with GitHub</span>
</button>
</div>
<!-- Divider -->
<div class="relative mb-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-200 dark:border-slate-800"></div>
</div>
<div class="relative flex justify-center text-sm uppercase">
<span class="bg-white dark:bg-slate-900 px-4 text-slate-500 dark:text-slate-400 font-medium tracking-wider">Or sign up with email</span>
</div>
</div>
<!-- Email Form -->
<form class="space-y-5">
<div>
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5" for="name">Full name</label>
<input class="w-full h-12 px-4 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" id="name" placeholder="Enter your full name" type="text"/>
</div>
<div>
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5" for="email">Work email</label>
<input class="w-full h-12 px-4 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" id="email" placeholder="name@company.com" type="email"/>
</div>
<div>
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5" for="password">Password</label>
<input class="w-full h-12 px-4 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" id="password" placeholder="Min. 8 characters" type="password"/>
</div>
<button class="w-full h-12 bg-primary hover:bg-blue-700 text-white font-bold rounded-lg shadow-lg shadow-primary/30 transition-all flex items-center justify-center gap-2" type="submit">
                    Create account
                    <span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</form>
<!-- Legal Footer -->
<p class="mt-6 text-center text-xs text-slate-500 dark:text-slate-400 leading-relaxed">
                By clicking "Create account", you agree to our <br class="hidden sm:block"/>
<a class="underline hover:text-primary transition-colors" href="#">Terms of Service</a> and 
                <a class="underline hover:text-primary transition-colors" href="#">Privacy Policy</a>.
            </p>
</div>
<!-- Login Link -->
<p class="mt-8 text-slate-600 dark:text-slate-400 font-medium">
            Already have an account? 
            <a class="text-primary hover:underline font-bold ml-1 transition-all" href="#">Log in</a>
</p>
<!-- Page Footer Info -->
<div class="mt-12 flex items-center gap-8 opacity-50">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-lg">verified_user</span>
<span class="text-xs font-semibold tracking-widest uppercase">Enterprise Ready</span>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-lg">encrypted</span>
<span class="text-xs font-semibold tracking-widest uppercase">SOC2 Type II</span>
</div>
</div>
</div>
</body></html>
