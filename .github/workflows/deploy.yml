name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 40.123.224.93
          username: mzain2004
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            cd /home/mzain2004/Phish-Slayer
            git pull origin main
            sed -i 's/- "80:3000"/- "3000:3000"/g' docker-compose.yml
            docker compose down
            docker build --no-cache \
              --build-arg NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }} \
              --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }} \
              --build-arg NEXT_PUBLIC_SITE_URL=https://phishslayer.tech \
              --build-arg NEXT_PUBLIC_PADDLE_CLIENT_TOKEN=${{ secrets.NEXT_PUBLIC_PADDLE_CLIENT_TOKEN }} \
              --build-arg NEXT_PUBLIC_PADDLE_SOC_PRO_PRICE_ID=${{ secrets.NEXT_PUBLIC_PADDLE_SOC_PRO_PRICE_ID }} \
              --build-arg NEXT_PUBLIC_PADDLE_CC_PRICE_ID=${{ secrets.NEXT_PUBLIC_PADDLE_CC_PRICE_ID }} \
              --build-arg NEXT_PUBLIC_PADDLE_ENV=production \
              --build-arg SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }} \
              --build-arg VIRUS_TOTAL_API_KEY=${{ secrets.VIRUS_TOTAL_API_KEY }} \
              --build-arg GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
              -t phish-slayer-local .
            docker compose up -d
            docker compose ps
            echo "Deployment complete!"
