name: Validate Production Chain

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-webhook-chain:
    name: Validate Webhook + Supabase Chain
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run production chain validation
        env:
          INTERNAL_API_URL: https://phishslayer.tech
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          WAZUH_WEBHOOK_SECRET: ${{ secrets.WAZUH_WEBHOOK_SECRET }}
        run: node scripts/event-chain-mock-test.mjs
