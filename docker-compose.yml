services:
  nextjs:
    image: ghcr.io/mzain2004/phish-slayer:latest
    ports:
      - "3000:3000"
    env_file: .env.production
    restart: unless-stopped
    networks: [app-network]

  api:
    image: ghcr.io/mzain2004/phish-slayer-api:latest
    ports:
      - "8000:8000"
    env_file: .env.production
    restart: unless-stopped
    networks: [app-network]

networks:
  app-network:
    driver: bridge
