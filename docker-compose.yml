services:
  nextjs:
    build: .
    ports:
      - "3000:3000"
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      - api
    networks: [app-network]

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - .env.production
    restart: unless-stopped
    networks: [app-network]

networks:
  app-network:
    driver: bridge
  